services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1003
      - PGID=1003
      - TZ=America/Los_Angeles
    volumes:
      - /opt/sonarr:/config
      - /mammoth/library/tv:/tv
      - /mammoth/downloads/transmission:/downloads
    restart: unless-stopped
    network_mode: host