services:
  vpn:
    image: ghcr.io/bubuntux/nordvpn
    container_name: media-vpn
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TOKEN=${NORDVPN_TOKEN}
      - CONNECT=NETHERLANDS
      - TECHNOLOGY=NordLynx
      - NETWORK=192.168.86.0/24
    ports:
      # Transmission
      - 9091:9091
      # - 8080:8080  # unknown — uncomment if needed
      - 51413:51413
      - 51413:51413/udp
      # Soulseek
      - 6080:6080
      - 61122:61122
      - 61123:61123
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    restart: unless-stopped

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=1003
      - PGID=1003
      - TZ=America/Los_Angeles
    volumes:
      - /opt/transmission:/config
      - /mammoth/downloads/transmission:/downloads
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn

  soulseek:
    image: realies/soulseek
    container_name: soulseek
    environment:
      - PUID=1003
      - PGID=1003
    volumes:
      - /opt/soulseek:/data/.SoulseekQt
      - /mammoth/downloads/soulseek:/data/Soulseek Downloads
      - /mammoth/library/music:/data/Soulseek Shared Folder
      - /opt/soulseek/logs:/data/Soulseek Chat Logs
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1003
      - PGID=1003
      - TZ=America/Los_Angeles
    volumes:
      - /opt/radarr:/config
      - /mammoth/library/movies:/movies
      - /mammoth/downloads/transmission:/downloads
    restart: unless-stopped
    network_mode: host

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1003
      - PGID=1003
      - TZ=America/Los_Angeles
    volumes:
      - /opt/sonarr:/config
      - /mammoth/library/tv:/tv
      - /mammoth/downloads/transmission:/downloads
    restart: unless-stopped
    network_mode: host

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1003
      - PGID=1003
      - TZ=America/Los_Angeles
    volumes:
      - /opt/lidarr:/config
      - /mammoth/library/music:/music
      - /mammoth/downloads/transmission:/downloads
    restart: unless-stopped
    network_mode: host

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=1003
      - PGID=1003
      - TZ=America/Los_Angeles
      - AUTO_UPDATE=true
    volumes:
      - /opt/jackett:/config
      - /mammoth/downloads/transmission:/downloads
    ports:
      - 9117:9117
    restart: unless-stopped
