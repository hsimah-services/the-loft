# glances.conf — mounted into the `glances` container (metrics profile)
#
# Only the AMP section below is populated; every other glances.conf section
# is optional and falls back to built-in defaults when omitted.

[amp_loft_version]
# Reports the git commit this host has deployed, so Homepage can flag hosts
# that need a `loft-ctl update`. .deployed-version is written by the tracked
# post-merge/post-checkout hooks (control-plane/hooks, activated by setup.sh
# §1b) on every git pull/checkout, plus a one-time manual seed on first
# rollout per host — see docs/services/houstn.md.
#
# AMPs key off a running process regex rather than a schedule, so this
# anchors on dockerd — always running on every Loft host — purely to get a
# refresh tick; the command itself ignores the matched process.
#
# glances runs AMP commands without a shell, so redirection/fallback syntax
# (2>/dev/null, ||) is passed through as literal argv tokens rather than
# interpreted — keep this a plain command with no shell metacharacters.
enable=true
regex=dockerd
refresh=60
one_line=true
command=cat /rootfs/srv/the-loft/.deployed-version
