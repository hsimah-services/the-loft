---
- Fleet:
    # Per-host CPU/mem + deployed git commit in one card, via glances' combined
    # /api/4/all endpoint. commit comes from the loft_version AMP (see
    # services/houstn/glances.conf), kept current by tracked post-merge/
    # post-checkout hooks — compare against main on GitHub to spot hosts that
    # need a loft-ctl update. Disk is intentionally omitted: glances' fs list
    # varies in order/length per host (extra volumes, container bind-mount
    # noise), so a static array index isn't reliably the same mount everywhere.
    - space-needle:
        icon: mdi-server
        description: CPU / mem / commit
        widget:
          type: customapi
          url: http://host.docker.internal:61208/api/4/all
          refreshInterval: 10000
          mappings:
            - field: cpu.total
              label: CPU
              format: percent
            - field: mem.percent
              label: MEM
              format: percent
            - field: amps.0.result
              label: commit
              format: text
    # fjord offline — suppressed to avoid an API-error tile, restore when back
    #- fjord:
    #    icon: mdi-server
    #    description: CPU / mem / commit
    #    widget:
    #      type: customapi
    #      url: http://fjord:61208/api/4/all
    #      refreshInterval: 10000
