services:
  # ── Hub profile ─────────────────────────────────────────────────────────────
  beszel:
    image: henrygd/beszel
    container_name: beszel
    restart: unless-stopped
    profiles:
      - hub
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /opt/houstn/beszel/data:/beszel_data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - loft-proxy

  uptime:
    image: louislam/uptime-kuma:1
    container_name: uptime
    restart: unless-stopped
    profiles:
      - hub
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /opt/houstn/uptime/data:/app/data
    dns:
      - 192.168.86.28
    networks:
      - loft-proxy

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    profiles:
      - hub
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=homepage.loft.hsimah.com,homepage.space-needle
    volumes:
      - ./homepage-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "fjord:192.168.86.30"
      - "viking:192.168.86.26"
      - "calavera:192.168.86.35"
    networks:
      - loft-proxy

  # ── Metrics profile ──────────────────────────────────────────────────────────
  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    profiles:
      - metrics
    network_mode: host
    pid: host
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
      - /etc/os-release:/etc/os-release:ro
      - ./glances.conf:/glances/conf/glances.conf:ro
    environment:
      - GLANCES_OPT=-w -C /glances/conf/glances.conf

networks:
  loft-proxy:
    external: true
