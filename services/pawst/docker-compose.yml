services:
  pawst:
    image: nginx:alpine
    container_name: pawst
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/pawst/hblake-html:/usr/share/nginx/hblake:ro
      - /opt/pawst/hsimah-html:/usr/share/nginx/hsimah:ro
    networks:
      - loft-proxy

networks:
  loft-proxy:
    external: true
