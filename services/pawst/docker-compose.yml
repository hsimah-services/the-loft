services:
  pawst:
    image: nginx:alpine
    container_name: pawst
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - hblake-html:/usr/share/nginx/hblake
      - hsimah-html:/usr/share/nginx/hsimah
    ports:
      - "8085:80"
    networks:
      - loft-proxy

volumes:
  hblake-html:
  hsimah-html:

networks:
  loft-proxy:
    external: true
