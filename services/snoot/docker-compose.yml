services:
  snoot:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: snoot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - loft-proxy

networks:
  loft-proxy:
    external: true
