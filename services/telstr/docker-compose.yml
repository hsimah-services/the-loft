services:
  telstr:
    image: ghcr.io/henrygd/beszel:latest
    container_name: telstr
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /opt/telstr/data:/beszel/data
    networks:
      - loft-proxy

networks:
  loft-proxy:
    external: true
