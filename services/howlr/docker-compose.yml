services:
  # ── Server profile ──────────────────────────────────────────────
  music-assistant:
    image: ghcr.io/music-assistant/server:latest
    container_name: howlr
    profiles:
      - server
    network_mode: host
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /opt/howlr:/data

  # ── Client profile ─────────────────────────────────────────────
  snapclient:
    image: ivdata/snapclient:latest
    container_name: howlr-snapclient
    profiles:
      - client
    network_mode: host
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    devices:
      - /dev/snd:/dev/snd
    environment:
      HOST: ${SNAPSERVER_HOST}
      EXTRA_ARGS: "--soundcard ${SOUND_DEVICE:-default} --hostID ${HOST_ID}"
