services:
  # ── Server profile ──────────────────────────────────────────────
  snapserver:
    image: ivdata/snapserver:latest
    container_name: howlr-snapserver
    profiles:
      - server
    network_mode: host
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - snapcast-pipes:/tmp/snapcast
      - ./config/snapserver.conf:/etc/snapserver.conf:ro

  shairport-sync:
    image: mikebrady/shairport-sync:latest
    container_name: howlr-shairport-sync
    profiles:
      - server
    network_mode: host
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - snapcast-pipes:/tmp/snapcast
      - ./config/shairport-sync.conf:/etc/shairport-sync.conf:ro

  librespot:
    image: giof71/librespot:latest
    container_name: howlr-librespot
    profiles:
      - server
    network_mode: host
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - snapcast-pipes:/tmp/snapcast
    environment:
      DEVICE_NAME: ${LIBRESPOT_NAME:-The Loft Spotify}
      BACKEND: pipe
      DEVICE: /tmp/snapcast/spotify-fifo
      BITRATE: "320"
      INITIAL_VOLUME: "100"
      ENABLE_VOLUME_NORMALISATION: "Y"
      DEVICE_TYPE: speaker

  # ── Client profile ─────────────────────────────────────────────
  snapclient:
    image: ivdata/snapclient:latest
    container_name: howlr-snapclient
    profiles:
      - client
    network_mode: host
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    devices:
      - /dev/snd:/dev/snd
    environment:
      HOST: ${SNAPSERVER_HOST}
      EXTRA_ARGS: "--soundcard ${SOUND_DEVICE:-default} --hostID ${HOST_ID}"

volumes:
  snapcast-pipes:
