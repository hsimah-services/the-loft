[http]
enabled = true
bind_address = 0.0.0.0
port = 1780
doc_root = /usr/share/snapserver/snapweb

[stream]
# AirPlay 2 outputs S32_LE at 48kHz (not 44100:16:2 like AirPlay classic)
# Known issue: snapweb browser client crashes when assigned to the AirPlay stream
source = pipe:///tmp/snapcast/shairport-fifo?name=AirPlay&sampleformat=48000:32:2&mode=create&codec=null
source = pipe:///tmp/snapcast/shairport-fifo-viking?name=AirPlay - Viking&sampleformat=48000:32:2&mode=create&codec=null
source = pipe:///tmp/snapcast/shairport-fifo-fjord?name=AirPlay - Fjord&sampleformat=48000:32:2&mode=create&codec=null

# Spotify Connect outputs S16 at 44100 Hz
source = pipe:///tmp/snapcast/spotify-fifo?name=Spotify&sampleformat=44100:16:2&mode=create&codec=null
source = pipe:///tmp/snapcast/spotify-fifo-viking?name=Spotify - Viking&sampleformat=44100:16:2&mode=create&codec=null
source = pipe:///tmp/snapcast/spotify-fifo-fjord?name=Spotify - Fjord&sampleformat=44100:16:2&mode=create&codec=null

# DLNA (gmrender-resurrect) outputs S16 at 44100 Hz
source = pipe:///tmp/snapcast/dlna-fifo?name=DLNA&sampleformat=44100:16:2&mode=create&codec=null
source = pipe:///tmp/snapcast/dlna-fifo-viking?name=DLNA - Viking&sampleformat=44100:16:2&mode=create&codec=null
source = pipe:///tmp/snapcast/dlna-fifo-fjord?name=DLNA - Fjord&sampleformat=44100:16:2&mode=create&codec=null

# Meta streams — one per room, auto-plays whichever protocol is active
# Priority order: AirPlay > Spotify > DLNA
source = meta:///AirPlay/Spotify/DLNA?name=The Loft
source = meta:///AirPlay - Viking/Spotify - Viking/DLNA - Viking?name=Viking
source = meta:///AirPlay - Fjord/Spotify - Fjord/DLNA - Fjord?name=Fjord
