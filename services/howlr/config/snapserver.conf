[http]
enabled = true
bind_address = 0.0.0.0
port = 1780
doc_root = /usr/share/snapserver/snapweb

[stream]
# AirPlay 2 outputs S32_LE at 48kHz (not 44100:16:2 like AirPlay classic)
# Known issue: snapweb browser client crashes when assigned to the AirPlay stream
source = pipe:///tmp/snapcast/shairport-fifo?name=AirPlay&sampleformat=48000:32:2&mode=create
source = pipe:///tmp/snapcast/spotify-fifo?name=Spotify&sampleformat=44100:16:2&mode=create
