# DarkIce configuration — streams LP5X turntable audio to Icecast

[general]
duration        = 0
bufferSecs      = 5
reconnect       = yes

[input]
device          = plughw:LP5X,0
sampleRate      = 44100
bitsPerSample   = 16
channel         = 2

[icecast2-0]
bitrateMode     = vbr
quality         = 0.8
format          = vorbis
server          = spinnik-icecast
port            = 8000
password        = lofty-vinyl-stream
mountPoint      = vinyl
name            = The Loft Turntable
description     = Live vinyl from the Audio-Technica LP5X
