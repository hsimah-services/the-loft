server {
    listen 80;

    # MA API proxy — injects auth header server-side
    location = /api/spinnik {
        rewrite ^ /api break;
        proxy_pass http://${MA_HOST}:8095;
        proxy_set_header Authorization "Bearer ${MA_API_TOKEN}";
        proxy_set_header Content-Type "application/json";
    }

    # Icecast stream proxy — same-origin for Web Audio API visualizer
    location = /stream {
        rewrite ^ /vinyl break;
        proxy_pass http://spinnik-icecast:8000;
        proxy_buffering off;
    }

    # Static UI
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
