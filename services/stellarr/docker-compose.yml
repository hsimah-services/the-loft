services:
  vpn:
    image: ghcr.io/bubuntux/nordvpn
    container_name: stellarr-vpn
    cap_add:
      - NET_ADMIN
      - NET_RAW
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      - TOKEN=${NORDVPN_TOKEN}
      - CONNECT=NETHERLANDS
      - TECHNOLOGY=NordLynx
      - NETWORK=192.168.86.0/24
    ports:
      # Transmission
      - 9091:9091
      # - 8080:8080  # unknown — uncomment if needed
      - 51413:51413
      - 51413:51413/udp
      # Soulseek (slskd)
      - 5030:5030
      - 50300:50300
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    restart: unless-stopped

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/transmission:/config
      - /mammoth/downloads:/downloads
      - ./transmission/remove-torrents.sh:/scripts/remove-torrents.sh:ro
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SOULSEEK_USERNAME=${SLSKD_SOULSEEK_USERNAME}
      - SLSKD_SOULSEEK_PASSWORD=${SLSKD_SOULSEEK_PASSWORD}
      - SLSKD_DOWNLOADS_DIR=/downloads/completed/lidarr
      - SLSKD_INCOMPLETE_DIR=/downloads/incomplete
      - SLSKD_SHARED_DIR=/music
    volumes:
      - /opt/slskd:/app
      - /mammoth/downloads:/downloads
      - /mammoth/library/music:/music:ro
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/radarr:/config
      - /mammoth/library/movies:/movies
      - /mammoth/downloads:/downloads
    restart: unless-stopped
    network_mode: host

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/sonarr:/config
      - /mammoth/library/tv:/tv
      - /mammoth/downloads:/downloads
    restart: unless-stopped
    network_mode: host

  lidarr:
    image: lscr.io/linuxserver/lidarr:nightly
    container_name: lidarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/lidarr:/config
      - /mammoth/library/music:/music
      - /mammoth/downloads:/downloads
    restart: unless-stopped
    network_mode: host

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - AUTO_UPDATE=true
    volumes:
      - /opt/jackett:/config
    ports:
      - 9117:9117
    restart: unless-stopped
