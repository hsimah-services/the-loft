services:
  hblake:
    image: nginx:alpine
    container_name: hblake
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - html:/usr/share/nginx/html
    ports:
      - "8085:80"
    networks:
      - loft-proxy

volumes:
  html:

networks:
  loft-proxy:
    external: true
