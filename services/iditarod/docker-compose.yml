services:
  iditarod:
    build:
      context: .
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    container_name: iditarod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-work:/home/runner/actions-runner/_work
      - ${GITHUB_APP_KEY_PATH:-/etc/loft/iditarod-app.pem}:/run/secrets/github_app_key:ro
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock

volumes:
  runner-work:
