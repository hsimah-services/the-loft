services:
  runner:
    build: .
    restart: unless-stopped
    environment:
      ACCESS_TOKEN: "${ACCESS_TOKEN}"
      REPO_URL: "${REPO_URL}"
      RUNNER_NAME: "${RUNNER_NAME:-iditarod}"
      RUNNER_LABELS: "${RUNNER_LABELS:-self-hosted,linux,x64}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-work:/tmp/runner/work

volumes:
  runner-work:
