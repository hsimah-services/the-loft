name: Playwright E2E Tests

on: push

jobs:
  e2e-tests:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start WordPress
        run: docker compose -f .docker/iditarod/test/docker-compose.yml up -d

      - name: Wait for WordPress
        run: |
          echo "Waiting for WordPress to be ready..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:8080 | grep -q '200\|302'; then
              echo "WordPress is ready"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          echo "WordPress failed to start"
          exit 1

      - name: Seed test data
        run: |
          # TODO: Replace with actual seed command, e.g.:
          # docker exec wordpress-container wp db import /data/seed.sql --allow-root
          # docker exec wordpress-container wp plugin activate --all --allow-root
          echo "Seed command placeholder — replace with wp-cli / import command"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run e2e:test

      - name: Teardown
        if: always()
        run: docker compose -f .docker/iditarod/test/docker-compose.yml down -v
