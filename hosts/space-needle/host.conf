# hosts/space-needle/host.conf

# ── Identity ───────────────────────────────────────────────────────
HOST_NAME="space-needle"

# ── Services ───────────────────────────────────────────────────────
SERVICES=(mushr plex media pupyrus iditarod howlr pulsr)

# ── Storage mount (leave empty for no mount) ───────────────────────
STORAGE_DEVICE="/dev/sda1"
STORAGE_MOUNT="/mammoth"
STORAGE_FS="xfs"

# ── Directories (755 config dirs, 775 media dirs) ──────────────────
CONFIG_DIRS=(
  /opt/plex/config
  /opt/radarr
  /opt/sonarr
  /opt/lidarr
  /opt/jackett
  /opt/transmission
  /opt/soulseek
  /opt/soulseek/logs
  /opt/pupyrus/html
  /opt/pupyrus/db
  /opt/iditarod
  /opt/howlr
  /opt/pulsr/data
)
MEDIA_DIRS=(
  /mammoth/library/movies
  /mammoth/library/tv
  /mammoth/library/music
  /mammoth/library/videos
  /mammoth/library/stand-up
  /mammoth/downloads/transmission
  /mammoth/downloads/soulseek
  /mammoth/plex/transcode
)

# ── User config ────────────────────────────────────────────────────
LITTLEDOG_EXTRA_GROUPS="render,video"

# ── SSH ────────────────────────────────────────────────────────────
SSH_DISABLE_PASSWORD="false"

# ── Health check URLs ──────────────────────────────────────────────
declare -A HEALTH_URLS=(
  [plex]="http://localhost:32400/web"
  [radarr]="http://localhost:7878"
  [sonarr]="http://localhost:8989"
  [lidarr]="http://localhost:8686"
  [jackett]="http://localhost:9117"
  [pupyrus]="http://localhost:8081"
  [mushr]="http://localhost:8880/health"
  [snapweb]="http://localhost:1780"
  [pulsr]="https://pulsr.space-needle/api/v1/instance"
)
declare -A HEALTH_URLS_WARN=(
  [transmission]="http://localhost:9091"
  [soulseek]="http://localhost:6080"
)
