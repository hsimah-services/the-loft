# hosts/space-needle/host.conf

# ── Identity ───────────────────────────────────────────────────────
HOST_NAME="space-needle"

# ── Services ───────────────────────────────────────────────────────
SERVICES=(mushr pawpcorn stellarr pupyrus howlr pulsr pawst houstn snoot)

# ── Storage mount (leave empty for no mount) ───────────────────────
STORAGE_DEVICE="/dev/sda1"
STORAGE_MOUNT="/mammoth"
STORAGE_FS="xfs"

# ── Directories (755 config dirs, 775 media dirs) ──────────────────
CONFIG_DIRS=(
  /opt/pawpcorn/config
  /opt/radarr
  /opt/sonarr
  /opt/lidarr
  /opt/bazarr
  /opt/jackett
  /opt/transmission
  /opt/slskd
  /opt/pupyrus/html
  /opt/pupyrus/db
  /opt/howlr
  /opt/pulsr/data
  /opt/houstn/beszel/data
  /opt/houstn/uptime/data
  /opt/pawst/hblake-html
  /opt/pawst/hsimah-html
)
MEDIA_DIRS=(
  /mammoth/library/movies
  /mammoth/library/tv
  /mammoth/library/music
  /mammoth/library/videos
  /mammoth/library/stand-up
  /mammoth/downloads/transmission
  /mammoth/downloads/soulseek
  /mammoth/downloads/soulseek/complete
  /mammoth/downloads/soulseek/downloading
  /mammoth/pawpcorn/transcode
)

# ── User config ────────────────────────────────────────────────────
LITTLEDOG_EXTRA_GROUPS="render,video"

# ── SSH ────────────────────────────────────────────────────────────
SSH_DISABLE_PASSWORD="false"

# ── Fleet reporting ───────────────────────────────────────────────
REPORT_DISKS=(/ /mammoth)

# ── Pull-based deploys ────────────────────────────────────────────
# DEPLOY_TARGETS entries: "name|owner/repo|target_dir|optional_post_hook"
# Each spawns an hourly cron via setup.sh. Releases must publish a .tar.gz
# asset containing the deployable tree.
DEPLOY_TARGETS=(
  "pawst-hblake|hsimah-services/hblake|/opt/pawst/hblake-html|"
  "pawst-hsimah|hsimah-services/hsimah|/opt/pawst/hsimah-html|"
)

# ── Health check endpoints ────────────────────────────────────────
# SERVICE_ENDPOINTS: service → space-separated endpoint labels
# SERVICE_ENDPOINTS_WARN: service → space-separated warn-only labels
# HEALTH_URLS: label:tier → URL  (tiers: local, lan, ssl)
# HEALTH_URLS_WARN: label:tier → URL (warn-only, e.g. VPN-dependent)

declare -A SERVICE_ENDPOINTS=(
  [pawpcorn]="pawpcorn"
  [stellarr]="radarr sonarr lidarr bazarr jackett"
  [pupyrus]="pupyrus"
  [mushr]="mushr"
  [howlr]="howlr snapweb"
  [pulsr]="pulsr"
  [pawst]="pawst hsimah"
  [houstn]="beszel uptime homepage"
)
declare -A SERVICE_ENDPOINTS_WARN=(
  [stellarr]="transmission slskd"
)

declare -A HEALTH_URLS=(
  # pawpcorn
  [pawpcorn:local]="http://localhost:32400/web"
  [pawpcorn:lan]="http://pawpcorn.space-needle"
  [pawpcorn:ssl]="https://pawpcorn.loft.hsimah.com"
  # stellarr — radarr (no local tier: bridged, reached via Caddy)
  [radarr:lan]="http://radarr.space-needle"
  [radarr:ssl]="https://radarr.loft.hsimah.com"
  # stellarr — sonarr (no local tier: bridged, reached via Caddy)
  [sonarr:lan]="http://sonarr.space-needle"
  [sonarr:ssl]="https://sonarr.loft.hsimah.com"
  # stellarr — lidarr (no local tier: bridged, reached via Caddy)
  [lidarr:lan]="http://lidarr.space-needle"
  [lidarr:ssl]="https://lidarr.loft.hsimah.com"
  # stellarr — bazarr (no local tier: bridged, reached via Caddy)
  [bazarr:lan]="http://bazarr.space-needle"
  [bazarr:ssl]="https://bazarr.loft.hsimah.com"
  # stellarr — jackett (no local tier: bridged, reached via Caddy)
  [jackett:lan]="http://jackett.space-needle"
  [jackett:ssl]="https://jackett.loft.hsimah.com"
  # pupyrus (no local tier: bridged, reached via Caddy)
  [pupyrus:lan]="http://pupyrus.space-needle"
  [pupyrus:ssl]="https://pupyrus.loft.hsimah.com"
  # mushr (proxy itself — only local admin API)
  [mushr:local]="http://localhost:8880/config/"
  # howlr — Music Assistant web UI
  [howlr:local]="http://localhost:8095"
  [howlr:lan]="http://howlr.space-needle"
  [howlr:ssl]="https://howlr.loft.hsimah.com"
  # howlr — snapweb (built-in snapserver)
  [snapweb:local]="http://localhost:1780"
  [snapweb:lan]="http://snapweb.space-needle"
  [snapweb:ssl]="https://snapweb.loft.hsimah.com"
  # pulsr (no direct port — all tiers go through Caddy)
  [pulsr:lan]="https://pulsr.space-needle/api/v1/instance"
  [pulsr:ssl]="https://pulsr.hsimah.com/api/v1/instance"
  # pawst (hbla.ke) (no local tier: bridged, reached via Caddy)
  [pawst:lan]="http://pawst.space-needle"
  [pawst:ssl]="https://hbla.ke"
  # pawst (hsimah.com)
  [hsimah:lan]="http://hsimah.space-needle"
  [hsimah:ssl]="https://hsimah.com"
  # houstn — beszel (Beszel monitoring hub)
  [beszel:lan]="http://beszel.space-needle"
  [beszel:ssl]="https://beszel.loft.hsimah.com"
  # houstn — uptime (Uptime Kuma)
  [uptime:lan]="http://uptime.space-needle"
  [uptime:ssl]="https://uptime.loft.hsimah.com"
  # houstn — homepage (Homepage dashboard)
  [homepage:lan]="http://homepage.space-needle"
  [homepage:ssl]="https://homepage.loft.hsimah.com"
)
declare -A HEALTH_URLS_WARN=(
  # stellarr — transmission (VPN-dependent)
  [transmission:local]="http://localhost:9091"
  [transmission:lan]="http://transmission.space-needle"
  [transmission:ssl]="https://transmission.loft.hsimah.com"
  # stellarr — slskd (VPN-dependent)
  [slskd:local]="http://localhost:5030"
  [slskd:lan]="http://soulseek.space-needle"
  [slskd:ssl]="https://soulseek.loft.hsimah.com"
)
