# hosts/calavera/host.conf

# ── Identity ───────────────────────────────────────────────────────
HOST_NAME="calavera"

# ── Services ───────────────────────────────────────────────────────
SERVICES=(howlr snoot houstn)

# ── Storage mount (leave empty for no mount) ───────────────────────
STORAGE_DEVICE=""
STORAGE_MOUNT=""
STORAGE_FS=""

# ── Directories (755 config dirs, 775 media dirs) ──────────────────
CONFIG_DIRS=()
MEDIA_DIRS=()

# ── User config ────────────────────────────────────────────────────
LITTLEDOG_EXTRA_GROUPS="audio"

# ── SSH ────────────────────────────────────────────────────────────
SSH_DISABLE_PASSWORD="true"

# ── WiFi watchdog ──────────────────────────────────────────────────
# USB Marvell adapter (predictable wlx<MAC> name), managed by NetworkManager
# — not the Pis' wlan0 + dhcpcd defaults. Watchdog restarts NetworkManager
# if the interface loses its IPv4 lease (issue #65 dropouts).
WIFI_IFACE="wlx501ac51167c0"
WIFI_DHCP_UNIT="NetworkManager"

# ── i3 desktop ─────────────────────────────────────────────────────
# Autologs the rodnik service account into an i3 session (see setup.sh §11b),
# which auto-launches firefox --kiosk as a Music Assistant touch dashboard.
I3_ENABLED="true"
# Dashboard URL shown fullscreen on the Surface touchscreen (Music Assistant,
# reverse-proxied by mushr). Direct fallback: http://192.168.86.28:8095
I3_DASHBOARD_URL="https://howlr.loft.hsimah.com"
# HiDPI scaling: the Surface Pro 2 panel is 1920×1080 on a 10.6" screen, so
# everything is tiny at the default 96 DPI. 192 = 200% — scales the X session
# (Xft.dpi) and the firefox dashboard (layout.css.devPixelsPerPx = I3_DPI/96).
I3_DPI="192"

# ── Health check endpoints ────────────────────────────────────────
declare -A SERVICE_ENDPOINTS=()
declare -A SERVICE_ENDPOINTS_WARN=()
declare -A HEALTH_URLS=()
declare -A HEALTH_URLS_WARN=()
