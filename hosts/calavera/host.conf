# hosts/calavera/host.conf

# ── Identity ───────────────────────────────────────────────────────
HOST_NAME="calavera"

# ── Services ───────────────────────────────────────────────────────
SERVICES=(howlr spinnik)

# ── Storage mount (leave empty for no mount) ───────────────────────
STORAGE_DEVICE=""
STORAGE_MOUNT=""
STORAGE_FS=""

# ── Directories (755 config dirs, 775 media dirs) ──────────────────
CONFIG_DIRS=()
MEDIA_DIRS=()

# ── User config ────────────────────────────────────────────────────
LITTLEDOG_EXTRA_GROUPS="audio"

# ── SSH ────────────────────────────────────────────────────────────
SSH_DISABLE_PASSWORD="true"

# ── Kiosk ──────────────────────────────────────────────────────────
KIOSK_ENABLED="true"
KIOSK_URL="http://localhost:8080"
KIOSK_SCALE="1"

# ── Fleet reporting ───────────────────────────────────────────────
REPORT_DISKS=(/)

# ── Health check endpoints ────────────────────────────────────────
declare -A SERVICE_ENDPOINTS=()
declare -A SERVICE_ENDPOINTS_WARN=()
declare -A HEALTH_URLS=()
declare -A HEALTH_URLS_WARN=()
